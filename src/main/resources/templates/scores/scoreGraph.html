<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Score Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Score History</h2>

<p id="noDataMessage" style="color:red;"></p>

<canvas id="scoreChart"></canvas>

<div style="position:absolute; bottom:20px; left:20px;">
    <form action="/scores/reset" method="post" onsubmit="return confirmReset()">

        <input type="hidden" name="reason" id="reasonInput">

        <button type="submit">점수 초기화</button>

    </form>
</div>
<p th:text="${scoresJson}"></p>

<script th:inline="javascript">

    let scores = [[${scores}]];

    let labels = [];
    let data = [];

    scores.forEach(function(score){
        labels.push(score.date);
        data.push(score.score);
    });

    const ctx = document.getElementById('scoreChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Daily Score',
                data: data,
                borderColor: 'blue'
            }]
        }
    });

</script>

</body>
</html>

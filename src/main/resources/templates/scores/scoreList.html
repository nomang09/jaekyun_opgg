<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #eee;
    }
  </style>
</head>

<body>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container">
  <div style="display: flex;">

    <!-- 왼쪽: 점수표 -->
    <div style="width: 300px;">
        <input type="date" id="searchDate">
        <button onclick="highlightDate()">검색</button>

        <br><br>

        <input type="date" id="startDate">
        <input type="date" id="endDate">
        <button onclick="filterGraphByDateRange()">범위 검색</button>
        <button onclick="resetGraph()">초기화</button>


      <table>
        <thead>
        <tr>
<!--          <th>#</th>-->
          <th>날짜</th>
          <th>점수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="score, stat : ${scores}"
            th:attr="data-index=${stat.index}">
<!--          <td th:text="${score.id}"></td>-->
          <td th:text="${score.date}"></td>
          <td th:text="${score.score}"></td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- 오른쪽: 그래프 -->
    <div style="flex-grow: 1; padding-left: 50px; height: 400px;">
      <canvas id="scoreChart"></canvas>
        <p id="message"
           style="color:red; text-align:center; margin-top:15px;">
        </p>
    </div>

  </div>
</div>

<script th:inline="javascript">

  let scores = [[${scores}]];

  let originalLabels = [];
  let originalData = [];

  scores.forEach(function(score){

    let date = score.date;

    if(Array.isArray(date)){
      date = date.join('-');
    }

      labels.push(date);
      data.push(score.score);

      originalLabels.push(date);
      originalData.push(score.score);
  });

  const ctx = document.getElementById('scoreChart');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Daily Score',
        data: data,
        borderColor: 'blue'
      }]
    },
    options: {
      maintainAspectRatio: false
    }
  });
  const rows = document.querySelectorAll("tbody tr");

  rows.forEach((row, index) => {

    row.addEventListener("mouseenter", function () {

      if (!chart) return; // 🔥 안전장치

      const meta = chart.getDatasetMeta(0);
      const point = meta.data[index];

      if (!point) return; // 🔥 index 범위 방지

      chart.setActiveElements([
        { datasetIndex: 0, index: index }
      ]);

      chart.tooltip.setActiveElements(
              [{ datasetIndex: 0, index: index }],
              { x: point.x, y: point.y }
      );

      chart.update();
    });

    row.addEventListener("mouseleave", function () {

      chart.setActiveElements([]);
      chart.tooltip.setActiveElements([], { x: 0, y: 0 });
      chart.update();
    });

  });

  function highlightDate(){

      let inputDate = document.getElementById("searchDate").value;

      let found = false;

      const rows = document.querySelectorAll("tbody tr");

      rows.forEach((row, index) => {

          // 기존 강조 제거
          row.style.backgroundColor = "";

          let rowDate = labels[index];

          // 날짜 형식 맞추기
          if(Array.isArray(rowDate)){
              rowDate = rowDate.join('-');
          }

          // 월/일 0 붙이기
          rowDate = rowDate
              .split('-')
              .map(num => num.padStart(2, '0'))
              .join('-');

          // 검색 성공
          if(rowDate === inputDate){

              found = true;

              // 표 강조
              row.style.backgroundColor = "yellow";

              // 그래프 툴팁 표시
              chart.setActiveElements([
                  { datasetIndex: 0, index: index }
              ]);

              const point = chart.getDatasetMeta(0).data[index];

              chart.tooltip.setActiveElements([
                  { datasetIndex: 0, index: index }
              ], {
                  x: point.x,
                  y: point.y
              });

              chart.update();
          }

      });

      // 검색 실패
      if(!found){

          const message = document.getElementById("message");

          message.innerText = "그 날 게임을 한 기록이 없습니다.";

          setTimeout(function(){
              message.innerText = "";
          }, 2000);
      }
  }//수정

  function filterGraphByDateRange(){

      let startDate = document.getElementById("startDate").value;
      let endDate = document.getElementById("endDate").value;

      let filteredLabels = [];
      let filteredData = [];

      originalLabels.forEach((label, index) => {

          if(label >= startDate && label <= endDate){

              filteredLabels.push(label);
              filteredData.push(originalData[index]);
          }
      });

      chart.data.labels = filteredLabels;
      chart.data.datasets[0].data = filteredData;

      chart.update();
  }

  function resetGraph(){

      chart.data.labels = originalLabels;
      chart.data.datasets[0].data = originalData;

      chart.update();
  }
</script>

</body>
</html>
